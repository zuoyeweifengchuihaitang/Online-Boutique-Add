apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-memory-emailservice
  namespace: chaos-testing
spec:
  action: stress
  mode: all
  duration: 30s
  selector:
    namespaces:
      - default
    labelSelectors:
      app: emailservice
  stressors:
    memory:
      workers: 1
      size: "256M"

[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --html=reports/report.html --self-contained-html --json-report --json-report-file=reports/pytest-report.json
markers =
    checkout: end-to-end checkout flow
    currency: currency selector behavior
    comments: product review/comment system behavior
filterwarnings =
    ignore::DeprecationWarning
